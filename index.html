<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orario Formetica</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Orario Formetica</h1>
  <button id="theme-toggle" aria-label="Cambia tema">🌙</button>
</header>

<div id="search-wrapper">
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="Cerca per giorno o per docente">
  </div>
  <div id="day-filter">
    <select id="day-select">
      <option value="all">Tutti i giorni</option>
      <option value="lunedì">Lunedì</option>
      <option value="martedì">Martedì</option>
      <option value="mercoledì">Mercoledì</option>
      <option value="giovedì">Giovedì</option>
      <option value="venerdì">Venerdì</option>
      <option value="sabato">Sabato</option>
      <option value="domenica">Domenica</option>
    </select>
  </div>
</div>

<main id="calendar-container">
  <div id="calendar"></div>
</main>

<footer>
  <p>Per comunicazioni ufficiali guardare il gruppo su WhatsApp o utilizzare ClasseViva.</p>
</footer>

<!-- Bottone torna su -->
<div id="scroll-to-top" aria-label="Torna su" role="button">↑</div>

<script src="script.js"></script>
</body>
</html>
